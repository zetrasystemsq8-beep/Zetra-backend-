services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zetra
      POSTGRES_PASSWORD: zetra
      POSTGRES_DB: zetra
    ports:
      - "5432:5432"
    volumes:
      - zetra_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zetra"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://zetra:zetra@db:5432/zetra
      JWT_SECRET: change-me-to-a-long-random-string
      BIND_ADDR: 0.0.0.0:8080
      UPLOAD_DIR: /app/uploads
      RUST_LOG: info,zetra_backend=debug
    ports:
      - "8080:8080"
    volumes:
      - zetra_uploads:/app/uploads

volumes:
  zetra_db:
  zetra_uploads:
